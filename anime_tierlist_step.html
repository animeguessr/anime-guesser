<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tier List d'Animes - Mode par Étape</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Classez chaque Anime</h1>
    <div class="anime-container">
        <!-- Image de l’anime -->
        <img id="anime-image" src="" alt="Anime Image">
        <h2 id="anime-name">Nom de l'Anime</h2>
        <div class="tier-buttons">
            <button onclick="classifyAnime('S')">Tier S</button>
            <button onclick="classifyAnime('A')">Tier A</button>
            <button onclick="classifyAnime('B')">Tier B</button>
            <button onclick="classifyAnime('C')">Tier C</button>
            <button onclick="classifyAnime('D')">Tier D</button>
        </div>
    </div>
    <script src="anime_tierlist_step.js"></script>
</body>
</html>

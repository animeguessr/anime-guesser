<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tier List de Personnages - Mode par Étape</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Classez chaque Personnage</h1>
    <div class="character-container">
        <img id="character-image" src="" alt="Character Image">
        <h2 id="character-name">Nom du Personnage</h2>
        <div class="tier-buttons">
            <button onclick="classifyCharacter('S')">Tier S</button>
            <button onclick="classifyCharacter('A')">Tier A</button>
            <button onclick="classifyCharacter('B')">Tier B</button>
            <button onclick="classifyCharacter('C')">Tier C</button>
            <button onclick="classifyCharacter('D')">Tier D</button>
        </div>
    </div>
    <script src="character_tierlist_step.js"></script>
</body>
</html>

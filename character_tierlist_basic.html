<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tier List de Personnages - Mode Basique</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Classez les Personnages</h1>
    <div class="tier-list-container">
        <div class="tier-column" data-tier="S">Tier S</div>
        <div class="tier-column" data-tier="A">Tier A</div>
        <div class="tier-column" data-tier="B">Tier B</div>
        <div class="tier-column" data-tier="C">Tier C</div>
        <div class="tier-column" data-tier="D">Tier D</div>
    </div>
    <div class="character-selection">
        <div class="character-item" draggable="true">
            <!-- Les images et noms des personnages seront chargés via JavaScript -->
        </div>
    </div>
    <script src="character_tierlist_basic.js"></script>
</body>
</html>

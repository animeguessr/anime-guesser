<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devine le Personnage</title>
    <style>
        /* Style global */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease; /* Transition fluide pour le changement de fond */
        }

        .devine-container {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            position: relative; /* Pour positionner l'écran de fin de jeu */
        }

        .devine-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        .devine-character-container {
            position: relative;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .devine-character-image {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .devine-options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .devine-option-button {
            background: linear-gradient(135deg, #4e4376, #2b2b2b);
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .devine-option-button:hover {
            transform: scale(1.05);
        }

        /* Styles pour les réponses correctes et incorrectes */
        .correct {
            background: #28a745 !important;
        }

        .wrong {
            background: #dc3545 !important;
        }

        /* Écran de fin de jeu */
        .devine-game-over-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none; /* Caché par défaut */
            z-index: 1000;
        }

        .devine-game-over-screen.active {
            display: block;
        }

        .devine-game-over-screen button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        #devine-restart-button {
            background: #28a745;
            color: #fff;
        }

        #devine-restart-button:hover {
            background: #218838;
        }

        #devine-menu-button {
            background: #ffc107;
            color: #000;
        }

        #devine-menu-button:hover {
            background: #e0a800;
        }
    </style>
</head>
<body>
    <div class="devine-container">
        <!-- En-tête -->
        <div class="devine-header">
            <div>Vies : <span id="devine-lives">3</span></div>
            <div>Nombre de personnage trouvé : <span id="devine-score">0</span></div>
        </div>

        <!-- Conteneur de l'image -->
        <div class="devine-character-container">
            <img id="devine-character-image" src="" alt="Personnage" class="devine-character-image" />
        </div>

        <!-- Options -->
        <div class="devine-options-container">
            <button class="devine-option-button" id="option-1">Option 1</button>
            <button class="devine-option-button" id="option-2">Option 2</button>
            <button class="devine-option-button" id="option-3">Option 3</button>
            <button class="devine-option-button" id="option-4">Option 4</button>
        </div>

        <!-- Écran de fin de jeu -->
        <div class="devine-game-over-screen" id="devine-game-over-screen">
            <h2>Jeu Terminé</h2>
            <p>Votre Score : <span id="devine-final-score">0</span></p>
            <button id="devine-restart-button">Recommencer</button>
            <button id="devine-menu-button">Menu Principal</button>
        </div>
    </div>

    <!-- Bibliothèque Color Thief -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
    
    <script>
        // Variables de jeu
        let lives = 3;
        let score = 0;
        let cooldown = false; // Gestion du cooldown global

        // Références aux éléments du DOM
        const characterImage = document.getElementById('devine-character-image');
        const optionsContainer = document.querySelector('.devine-options-container');
        const livesDisplay = document.getElementById('devine-lives');
        const scoreDisplay = document.getElementById('devine-score');
        const gameOverScreen = document.getElementById('devine-game-over-screen');
        const finalScoreDisplay = document.getElementById('devine-final-score');
        const restartButton = document.getElementById('devine-restart-button');
        const menuButton = document.getElementById('devine-menu-button');
        const body = document.body;

        // Fonction pour obtenir une couleur contrastante (noir ou blanc) en fonction de la couleur donnée
        function getContrastingColor(rgb) {
            const luminance = (0.299 * rgb[0] + 0.587 * rgb[1] + 0.114 * rgb[2]) / 255;
            return luminance > 0.5 ? '#000' : '#fff';
        }

        // Fonction pour assombrir une couleur RGB de 20%
        function darkenColor(rgb, factor = 0.2) {
            const r = Math.max(0, Math.floor(rgb[0] * (1 - factor)));
            const g = Math.max(0, Math.floor(rgb[1] * (1 - factor)));
            const b = Math.max(0, Math.floor(rgb[2] * (1 - factor)));
            return `rgb(${r}, ${g}, ${b})`;
        }

        // Fonction pour changer dynamiquement le fond et les boutons en fonction de l'image actuelle
        function changeBackground() {
            const colorThief = new ColorThief();

            // Assurez-vous que l'image est chargée avant d'analyser les couleurs
            if (characterImage.complete && characterImage.naturalHeight !== 0) {
                const dominantColor = colorThief.getColor(characterImage);
                const backgroundGradient = `rgb(${dominantColor[0]}, ${dominantColor[1]}, ${dominantColor[2]})`;

                body.style.background = `radial-gradient(circle, ${backgroundGradient}, #000)`;

                // Calculer une couleur plus sombre pour le gradient des boutons
                const darkerColor = darkenColor(dominantColor, 0.2);

                // Obtenir une couleur de texte contrastante
                const textColor = getContrastingColor(dominantColor);

                // Sélectionner tous les boutons d'option
                const buttons = document.querySelectorAll('.devine-option-button');
                buttons.forEach(button => {
                    button.style.background = `linear-gradient(135deg, rgb(${dominantColor[0]}, ${dominantColor[1]}, ${dominantColor[2]}), ${darkerColor})`;
                    button.style.color = textColor;
                });
            }
        }

        // Charger un nouveau round
        async function loadCharacter() {
            if (cooldown) return; // Empêche le chargement si un cooldown est actif
            try {
                // Récupérer les données depuis l'API
                const res = await fetch('/get-character-game-data');
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                const data = await res.json();

                // Mettre à jour l'image du personnage principal
                const mainCharacter = data.mainCharacter;
                characterImage.src = mainCharacter.image_url;

                // Mettre à jour le fond et les boutons une fois l'image chargée
                characterImage.onload = () => {
                    changeBackground();
                };

                // Vider les options précédentes
                optionsContainer.innerHTML = '';

                // Ajouter les nouvelles options
                data.options.forEach(option => {
                    const button = document.createElement('button');
                    button.classList.add('devine-option-button');
                    button.innerHTML = `
                        <span class="devine-character-name">${option.name}</span>
                        <br>
                        <span class="devine-anime-title">${option.anime}</span>
                    `;

                    // Ajouter les événements de clic
                    if (option.id === mainCharacter.id) {
                        button.addEventListener('click', () => handleCorrectAnswer(button));
                    } else {
                        button.addEventListener('click', () => handleWrongAnswer(button, mainCharacter.name));
                    }

                    optionsContainer.appendChild(button);
                });
            } catch (error) {
                console.error('Erreur lors du chargement du personnage :', error);
            }
        }

        // Gestion des bonnes réponses
        function handleCorrectAnswer(button) {
            if (cooldown) return; // Bloque les clics multiples
            activateCooldown(); // Active le cooldown global

            button.classList.add('correct');
            score++;
            scoreDisplay.textContent = score;

            // Charger le prochain round après un délai
            setTimeout(() => {
                deactivateCooldown(); // Désactive le cooldown après le délai
                loadCharacter();
            }, 1000);
        }

        // Gestion des mauvaises réponses
        function handleWrongAnswer(button, correctName) {
            if (cooldown) return; // Bloque les clics multiples
            activateCooldown(); // Active le cooldown global

            button.classList.add('wrong');
            lives--;
            livesDisplay.textContent = lives;

            // Mettre en surbrillance la bonne réponse
            const buttons = optionsContainer.querySelectorAll('.devine-option-button');
            buttons.forEach(btn => {
                if (btn.textContent.includes(correctName)) {
                    btn.classList.add('correct');
                }
            });

            if (lives === 0) {
                endGame();
            } else {
                // Charger le prochain round après un délai
                setTimeout(() => {
                    deactivateCooldown(); // Désactive le cooldown après le délai
                    loadCharacter();
                }, 1000);
            }
        }

        // Terminer le jeu
        function endGame() {
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('active');
            // Suppression de l'appel à deactivateCooldown() pour empêcher la réactivation des boutons de choix
            // deactivateCooldown(); 
            // Les boutons de choix restent désactivés car cooldown reste actif
        }

        // Gestion du bouton "Recommencer"
        restartButton.addEventListener('click', () => {
            // Retirer la vérification de cooldown pour ce bouton
            activateCooldown(); // Active le cooldown global si nécessaire

            lives = 3;
            score = 0;
            livesDisplay.textContent = lives;
            scoreDisplay.textContent = score;
            gameOverScreen.classList.remove('active'); // Cacher l'écran "Jeu Terminé"
            
            setTimeout(() => {
                deactivateCooldown(); // Désactive le cooldown après le délai
                loadCharacter();
            }, 1000);
        });

        // Retour au menu principal
        menuButton.addEventListener('click', () => {
            // Retirer la vérification de cooldown pour ce bouton
            activateCooldown(); // Active le cooldown global si nécessaire

            setTimeout(() => {
                deactivateCooldown(); // Désactive le cooldown après le délai
                window.location.href = 'index.html';
            }, 1000);
        });

        // Activer le cooldown global
        function activateCooldown() {
            cooldown = true;
            disableAllButtons();
        }

        // Désactiver le cooldown global
        function deactivateCooldown() {
            cooldown = false;
            enableAllButtons();
        }

        // Désactiver tous les boutons sauf "Recommencer" et "Menu Principal"
        function disableAllButtons() {
            const buttons = document.querySelectorAll('button:not(#devine-restart-button):not(#devine-menu-button)');
            buttons.forEach(button => {
                button.disabled = true;
            });
        }

        // Réactiver tous les boutons sauf "Recommencer" et "Menu Principal"
        function enableAllButtons() {
            const buttons = document.querySelectorAll('button:not(#devine-restart-button):not(#devine-menu-button)');
            buttons.forEach(button => {
                button.disabled = false;
            });
        }

        // Charger le premier round après que le document soit prêt
        document.addEventListener('DOMContentLoaded', () => {
            loadCharacter();
        });
    </script>
</body>
</html>
